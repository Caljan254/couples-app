<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Special Space</title>
    <!-- Web App Manifest for PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#fd2f56">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Jitsi Meet API -->
    <script src='https://meet.jit.si/external_api.js'></script>
    <style>
        :root {
            --primary: #fd2f56;
            --secondary: #ff758c;
            --dark: #1e1e24;
            --light: #fff5f7;
            --glass: rgba(255, 255, 255, 0.95);
            --bubble-sent: #9c27b0;
            --bubble-received: #414141;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Screens */
        #login-screen, #identity-screen, #video-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--dark); z-index: 1000;
            display: flex; justify-content: center; align-items: center;
            flex-direction: column; color: white;
        }
        .hidden { display: none !important; }

        .login-box {
            background: var(--glass); padding: 40px; border-radius: 20px;
            text-align: center; color: var(--dark); width: 90%; max-width: 400px;
        }

        input { width: 100%; padding: 15px; border-radius: 10px; border: 2px solid var(--primary); margin: 15px 0; outline: none; }
        button, .btn { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; margin: 5px; }

        /* HEADER */
        header {
            background: white; padding: 5px 15px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 500;
            flex-shrink: 0;
            height: 50px;
        }
        header h1 { font-size: 1rem; color: var(--primary); }
        .nav-links { display: flex; gap: 12px; }
        .nav-links a { text-decoration: none; color: #666; font-weight: 600; cursor: pointer; font-size: 0.8rem; }
        .nav-links a.active { color: var(--primary); }
        .real-time { font-size: 0.8rem; font-weight: bold; color: var(--primary); }

        /* SCROLLABLE CHAT FEED */
        #app { display: none; flex-direction: column; height: 100vh; overflow: hidden; }
        
        main { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; width: 100%; max-width: 700px; margin: 0 auto; scroll-behavior: smooth;}
        .feed { display: flex; flex-direction: column; gap: 8px; }

        /* Profile Banner in Chat */
        .partner-head { text-align: center; margin-bottom: 20px; }
        .partner-img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--primary); object-fit: contain; }
        .partner-st { font-size: 0.7rem; display: block; color: #fff; margin-top: 3px; font-weight: bold;}

        /* BUBBLES */
        .post {
            border-radius: 15px; padding: 8px 12px;
            max-width: 85%; width: fit-content; min-width: 80px;
            position: relative; transition: transform 0.2s;
            cursor: pointer; touch-action: pan-y;
            color: white; font-size: 0.95rem;
        }
        .post-sent { align-self: flex-end; background: var(--bubble-sent); border-bottom-right-radius: 2px; }
        .post-received { align-self: flex-start; background: var(--bubble-received); border-bottom-left-radius: 2px; }

        /* INLINE REPLY */
        .inline-reply {
            background: rgba(255,255,255,0.15); border-radius: 6px;
            padding: 5px 8px; margin-bottom: 5px; border-right: 4px solid white;
            text-align: right;
        }
        .reply-name { font-weight: bold; font-size: 0.7rem; color: #eee; }
        .reply-msg { font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }

        .time { font-size: 0.6rem; color: rgba(255,255,255,0.5); text-align: right; display: block; margin-top: 2px; }

        /* BOTTOM INPUT AREA */
        .composer {
            background: #fff; border-top: 1px solid #eee; padding: 10px;
            display: flex; flex-direction: column; flex-shrink: 0;
            z-index: 600;
        }
        #reply-panel { background: #fdf2f4; border-left: 4px solid var(--primary); padding: 8px; margin-bottom: 10px; border-radius: 5px; display: none; }
        .input-row { display: flex; gap: 8px; align-items: center; }
        textarea { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd; font-family: inherit; font-size: 0.95rem; resize: none; max-height: 100px; outline: none; }
        
        #emoji-grid {
            display: none; grid-template-columns: repeat(8, 1fr); gap: 10px;
            max-height: 150px; overflow-y: auto; padding: 10px; font-size: 1.5rem; text-align: center;
        }

        #video-overlay { background: black; z-index: 2000; display: none; }
        .hangup { position: absolute; top: 15px; right: 15px; background: red; padding: 10px 20px; border-radius: 30px; }

        .section { display: none; height: 100%; border-radius: 10px; overflow-y: auto; }
        .section.active { display: block; }
    </style>
</head>

<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>💕 Secret Password</h2>
            <input type="password" id="pass-in" placeholder="...">
            <button onclick="login()">Enter</button>
        </div>
    </div>

    <div id="identity-screen" class="hidden">
        <div class="login-box">
            <h2>Select Identity</h2>
            <button onclick="pick('Caleb')">👨 Caleb</button>
            <button onclick="pick('Caroline')" style="margin-top:10px">👩 Caroline</button>
        </div>
    </div>

    <div id="video-overlay">
        <button class="hangup" onclick="hangup()">Hangup 📞</button>
        <div id="jitsi-box" style="width:100%; height:100%"></div>
    </div>

    <div id="app">
        <header>
            <h1>💕 Love</h1>
            <div class="nav-links">
                <a onclick="go('feed')" id="m-feed" class="active">Chat</a>
                <a onclick="go('gallery')" id="m-gallery">Gallery</a>
                <a onclick="go('calls')" id="m-calls">Calls</a>
            </div>
            <div class="real-time" id="clock">00:00:00</div>
        </header>

        <main id="chatWindow">
            <div id="section-feed" class="section active">
                <div class="partner-head" id="partnerHead"></div>
                <div class="feed" id="feedCont"></div>
            </div>

            <div id="section-gallery" class="section">
                <div id="gallCont" style="display:grid; grid-template-columns:repeat(3, 1fr); gap:6px;"></div>
            </div>

            <div id="section-calls" class="section">
                <div id="callsCont"></div>
            </div>
        </main>

        <div class="composer" id="msgComposer">
            <div id="reply-panel">
                <span id="rep-name" style="font-weight:bold; color:var(--primary); font-size:0.75rem"></span><br>
                <span id="rep-msg" style="font-size:0.8rem; color:#666"></span>
                <span style="float:right; cursor:pointer" onclick="cancelReply()">✕</span>
            </div>
            <div id="emoji-grid"></div>
            <div class="input-row">
                <span style="font-size:1.6rem; cursor:pointer" onclick="toggleEmoji()">😊</span>
                <textarea id="txtIn" rows="1" placeholder="Message..." oninput="pushTyping()"></textarea>
                <button class="btn secondary" onclick="document.getElementById('imgIn').click()"><i class="fas fa-camera"></i></button>
                <span id="voiceBtn" class="btn secondary" onclick="doVoice()"><i class="fas fa-microphone" id="micIco"></i></span>
                <button onclick="send()">Send</button>
            </div>
            <input type="file" id="imgIn" class="hidden" accept="image/*,video/*" onchange="upload()">
        </div>
    </div>

    <script>
        const API = 'https://couples-backend-afta.onrender.com';
        let me = '', pwd = '', callApi = null, isTyping = false, timer, replying = null;

        const emojis = ["❤️","💖","💕","😘","🥰","😍","😊","☺️","🤩","💍","💎","🧸","🌹","🌸","💏","💑","👩‍❤️‍💋‍👨","👨‍❤️‍💋‍👨","👩‍❤️‍💋‍👩","🤝","💫","✨","🔥"];

        function login() {
            if (document.getElementById('pass-in').value === 'MyLove') {
                pwd = 'MyLove'; sessionStorage.setItem('pwd', pwd);
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('identity-screen').classList.remove('hidden');
            } else alert('Unauthorized 💕');
        }

        function pick(n) {
            me = n; sessionStorage.setItem('user', n);
            document.getElementById('identity-screen').classList.add('hidden');
            document.getElementById('app').style.display = 'flex';
            initApp();
        }

        if (sessionStorage.getItem('user')) {
            me = sessionStorage.getItem('user'); pwd = sessionStorage.getItem('pwd');
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app').style.display = 'flex';
            initApp();
        }

        function initApp() {
            renderPartner();
            loadFeed(true);
            setInterval(() => loadFeed(), 8000);
            setInterval(() => pingServer(isTyping), 3000);
            setInterval(updateStatus, 4000);
            setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        }

        function renderPartner() {
            const isMeC = me === 'Caleb';
            const opp = isMeC ? 'Caroline' : 'Caleb';
            const img = isMeC ? './caroline.png' : './caleb.png';
            document.getElementById('partnerHead').innerHTML = `
                <img src="${img}" class="partner-img"><br>
                <span id="st-${opp}" class="partner-st">Offline ⚪</span>
                <div style="margin-top:10px">
                    <a onclick="doCall('Audio')" style="color:#fff; font-size:1.2rem; margin-right:20px"><i class="fas fa-phone"></i></a>
                    <a onclick="doCall('Video')" style="color:#fff; font-size:1.2rem"><i class="fas fa-video"></i></a>
                </div>`;
        }

        async function doCall(t) {
            document.getElementById('video-overlay').style.display = 'flex';
            callApi = new JitsiMeetExternalAPI("meet.jit.si", { roomName: "OurSweetSecurityRoom_Final", parentNode: document.querySelector('#jitsi-box')});
            await fetch(`${API}/log-call?caller=${me}&type=${t}`, { method: 'POST', headers: auth() });
        }
        function hangup() { if(callApi) callApi.dispose(); document.getElementById('video-overlay').style.display = 'none'; }

        function auth() { return { 'Authorization': 'Bearer ' + pwd }; }

        async function send() {
            const txt = document.getElementById('txtIn').value; if (!txt.trim()) return;
            const rpc = replying ? `reply_to_content=${encodeURIComponent(replying.content)}&reply_to_author=${replying.author}` : '';
            await fetch(`${API}/post?content=${encodeURIComponent(txt)}&author=${me}&${rpc}`, { method: 'POST', headers: auth() });
            document.getElementById('txtIn').value = ''; cancelReply(); loadFeed(true);
        }

        async function upload() {
            const f = document.getElementById('imgIn').files[0];
            const fd = new FormData(); fd.append('author', me); fd.append('content', "📸 Moment"); fd.append('media', f);
            await fetch(`${API}/upload-media`, { method: 'POST', headers: auth(), body: fd });
            loadFeed(true);
        }

        async function loadFeed(scroll = false) {
            const res = await fetch(`${API}/posts`, { headers: auth() });
            const posts = await res.json();
            const cont = document.getElementById('feedCont');
            cont.innerHTML = posts.map(p => {
                const isMe = p.author === me;
                let reply = p.reply_to_content ? `<div class="inline-reply"><span class="reply-name">${p.reply_to_author} ❤️</span><span class="reply-msg">${p.reply_to_content}</span></div>` : '';
                let media = (p.image_url) ? `<img src="${API}${p.image_url}" class="post-media" onclick="window.open('${API}${p.image_url}')">` : '';
                return `
                <div class="post ${isMe ? 'post-sent':'post-received'}" 
                     onmousedown="onSwipe(event, '${p.author}', '${p.content.replace(/'/g, "\\'")}')" 
                     ontouchstart="onSwipe(event, '${p.author}', '${p.content.replace(/'/g, "\\'")}')">
                    ${reply}
                    <div>${p.content}</div>
                    ${media}
                    <span class="time">${new Date(p.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                </div>`;
            }).join('');
            if (scroll) { const main = document.getElementById('chatWindow'); main.scrollTop = main.scrollHeight; }
        }

        function onSwipe(e, a, c) {
            const t = e.target.closest('.post'); if (!t) return;
            let sx = e.clientX || e.touches[0].clientX;
            const move = (me) => { let dx = (me.clientX || me.touches[0].clientX) - sx; if (dx > 20) t.style.transform = `translateX(${Math.min(dx, 60)}px)`; };
            const end = (ee) => { let dx = (ee.clientX || ee.changedTouches[0].clientX) - sx; if (dx > 50) setRep(a, c); t.style.transform = ''; document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', end); document.removeEventListener('touchmove', move); document.removeEventListener('touchend', end); };
            document.addEventListener('mousemove', move); document.addEventListener('mouseup', end); document.addEventListener('touchmove', move); document.addEventListener('touchend', end);
        }

        function setRep(a, c) {
            replying = { author: a, content: c };
            document.getElementById('reply-panel').style.display = 'block';
            document.getElementById('rep-name').innerText = a;
            document.getElementById('rep-msg').innerText = c;
            document.getElementById('txtIn').focus();
        }
        function cancelReply() { replying = null; document.getElementById('reply-panel').style.display = 'none'; }
        
        function pushTyping() { if (!isTyping) { isTyping = true; pingServer(true); } clearTimeout(timer); timer = setTimeout(() => { isTyping = false; pingServer(false); }, 4000); }
        async function pingServer(t) { await fetch(`${API}/ping?author=${me}&typing=${t}`, { method: 'POST', headers: auth() }); }
        
        async function updateStatus() {
            const res = await fetch(`${API}/status`, { headers: auth() });
            const d = await res.json();
            const opp = me === 'Caleb' ? 'Caroline' : 'Caleb';
            const el = document.getElementById(`st-${opp}`);
            if (el) {
                if (d.typing[opp]) { el.innerHTML = "Typing... ✍️"; el.style.color = "#fff"; }
                else if (d[opp]) { el.innerHTML = "Ready 🟢"; el.style.color = "#fff"; }
                else { el.innerHTML = "Offline ⚪"; el.style.color = "#ddd"; }
            }
        }

        function go(s) {
            document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
            document.getElementById(`section-${s}`).classList.add('active');
            document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
            document.getElementById(`m-${s}`).classList.add('active');
            document.getElementById('msgComposer').style.display = (s === 'feed') ? 'flex' : 'none';
        }

        function toggleEmoji() {
            const g = document.getElementById('emoji-grid');
            if (g.style.display === 'grid') g.style.display = 'none'; else {
                g.innerHTML = emojis.map(e => `<span onclick="document.getElementById('txtIn').value += '${e}'">${e}</span>`).join('');
                g.style.display = 'grid';
            }
        }

        let rec; let chunks = [];
        async function doVoice() {
            const ico = document.getElementById('micIco');
            if (ico.classList.contains('rec')) { rec.stop(); ico.classList.remove('rec'); ico.style.color = 'inherit'; } else {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                rec = new MediaRecorder(s); rec.start(); ico.classList.add('rec'); ico.style.color = 'red';
                chunks = []; rec.ondataavailable = e => chunks.push(e.data);
                rec.onstop = async () => {
                    const bl = new Blob(chunks, { type: 'audio/webm' });
                    const fd = new FormData(); fd.append('author', me); fd.append('content', "🎤 Voice"); fd.append('media', bl, "v.webm");
                    await fetch(`${API}/upload-media`, { method: 'POST', headers: auth(), body: fd });
                    loadFeed(true);
                };
            }
        }
    </script>
</body>
</html>
